<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 最大数字分析器</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(160deg, #0b0b17 0%, #13142a 40%, #0e0e1e 100%);
            --card-bg: rgba(22, 24, 42, 0.8);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #e6e6f0;
            --text-secondary: #9a9ab0;
            --accent: #b89cff;
            --success: #34d399;
            --danger: #f87171;
            --radius-xl: 22px;
            --radius-lg: 16px;
            --radius-sm: 10px;
            --shadow-card: 0 16px 40px rgba(0, 0, 0, 0.45);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-hover: rgba(255, 255, 255, 0.07);
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            background-attachment: fixed;
            padding: 20px;
            margin: 0;
            /* 开启硬件加速 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100%;
            max-width: 560px;
            z-index: 1;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-xl);
            padding: 32px 28px 24px;
            box-shadow: var(--shadow-card);
            color: var(--text);
            transition: all var(--transition);
        }

        .header-icon {
            font-size: 42px;
            display: block;
            text-align: center;
            margin-bottom: 4px;
        }
        .main-card h2 {
            text-align: center;
            font-size: 1.45rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #ffffff;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 22px;
        }

        /* 上传区域 */
        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.18);
            border-radius: var(--radius-lg);
            padding: 34px 20px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--glass);
            user-select: none;
        }
        .drop-zone:hover {
            border-color: rgba(184, 156, 255, 0.55);
            background: var(--glass-hover);
            box-shadow: 0 0 30px rgba(184, 156, 255, 0.06);
            transform: translateY(-1px);
        }
        .drop-zone.active {
            border-color: var(--accent);
            background: rgba(184, 156, 255, 0.06);
            box-shadow: 0 0 45px rgba(184, 156, 255, 0.12);
            border-style: solid;
            transform: scale(1.01);
        }
        .drop-icon {
            font-size: 44px;
            display: block;
            margin-bottom: 6px;
            transition: transform var(--transition);
        }
        .drop-zone.active .drop-icon {
            transform: translateY(-6px) scale(1.05);
        }
        .drop-zone p {
            color: #d0d0e4;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .drop-zone .hint-text {
            color: #8888a6;
            font-size: 0.75rem;
            margin-top: 4px;
        }
        input[type="file"] {
            display: none;
        }

        /* 已选文件标签 */
        .file-tag {
            display: none;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
            padding: 10px 14px;
            background: var(--glass);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 255, 255, 0.07);
            animation: slideIn 0.25s ease-out;
        }
        .file-tag.show {
            display: flex;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .file-tag .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }
        .file-tag .name {
            flex: 1;
            color: #d0d0e0;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-tag .clear-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 18px;
            padding: 2px 6px;
            border-radius: 6px;
            transition: all var(--transition);
        }
        .file-tag .clear-btn:hover {
            color: #f87171;
            background: rgba(248, 113, 113, 0.15);
        }

        /* 结果区域 */
        .result-area {
            display: none;
            margin-top: 18px;
            animation: fadeUp 0.25s ease-out;
        }
        .result-area.show {
            display: block;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .result-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: var(--radius-lg);
            padding: 18px 18px 14px;
        }
        .result-box .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            text-align: center;
        }
        .max-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .max-number {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: white;
            font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', monospace;
            word-break: break-all;
            transition: font-size 0.2s;
            max-width: 100%;
        }
        .max-number.shrink {
            font-size: 1.1rem;
        }
        .copy-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 7px 14px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            transition: all var(--transition);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .copy-btn.copied {
            background: rgba(52, 211, 153, 0.15);
            border-color: var(--success);
            color: var(--success);
        }

        /* 统计网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }
        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-sm);
            padding: 8px 6px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            font-family: 'JetBrains Mono', monospace;
        }
        .stat-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* 历史记录区域 */
        .history-section {
            margin-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.09);
            padding-top: 18px;
        }
        .history-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 12px;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .history-list::-webkit-scrollbar {
            width: 4px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 4px;
        }
        .history-item {
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all var(--transition);
            animation: fadeInItem 0.25s ease-out;
        }
        @keyframes fadeInItem {
            from {
                opacity: 0;
                transform: translateX(8px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .history-info {
            flex: 1;
            min-width: 0;
        }
        .history-file-name {
            font-weight: 600;
            font-size: 0.83rem;
            color: #e0e0f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-meta {
            font-size: 0.68rem;
            color: #8888a6;
            margin-top: 3px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .history-meta span {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .delete-history-btn {
            background: none;
            border: none;
            color: #777;
            cursor: pointer;
            font-size: 18px;
            padding: 6px;
            border-radius: 8px;
            transition: all var(--transition);
            flex-shrink: 0;
            margin-left: 8px;
        }
        .delete-history-btn:hover {
            color: var(--danger);
            background: rgba(248, 113, 113, 0.12);
        }

        /* 确认弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-dialog {
            background: rgba(20, 22, 42, 0.92);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: var(--radius-lg);
            padding: 22px;
            text-align: center;
            max-width: 300px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            color: white;
        }
        .modal-dialog p {
            font-size: 0.9rem;
            margin-bottom: 16px;
            color: #ccc;
        }
        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .modal-btn {
            padding: 8px 20px;
            border-radius: 16px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.82rem;
        }
        .modal-btn.confirm {
            background: #f87171;
            color: white;
        }
        .modal-btn.confirm:hover {
            background: #ef4444;
        }
        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .modal-btn.cancel:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .empty-history {
            color: #5a5a70;
            font-size: 0.8rem;
            text-align: center;
            padding: 14px;
        }
    </style>
</head>
<body>
    <!-- 确认删除弹窗 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-dialog">
            <p>💬确定要删除这条历史记录吗？</p>
            <div class="modal-buttons">
                <button class="modal-btn confirm" id="modalConfirmBtn">删除</button>
                <button class="modal-btn cancel" id="modalCancelBtn">取消</button>
            </div>
        </div>
    </div>

    <!-- 主界面 -->
    <div class="container">
        <div class="main-card">
            <span class="header-icon">🔍</span>
            <h2>最大数字查找器</h2>
            <p class="subtitle">上传文件 · 寻找最大数字</p>

            <div class="drop-zone" id="dropZone">
                <span class="drop-icon">📁</span>
                <p>点击或拖拽文件到此处</p>
                <p class="hint-text">支持 .txt .csv .log 等文本文件</p>
            </div>
            <input type="file" id="fileInput" accept=".txt,.csv,.log,.json,.xml,.md,.html,.js,.py,.css,text/plain">

            <div class="file-tag" id="fileTag">
                <span class="dot"></span>
                <span class="name" id="fileNameDisplay"></span>
                <button class="clear-btn" id="clearFileBtn" title="清除文件">✕</button>
            </div>

            <div class="result-area" id="resultArea">
                <div class="result-box">
                    <div class="label">🏆 最大数字</div>
                    <div class="max-row">
                        <span class="max-number" id="maxNumberDisplay"></span>
                        <button class="copy-btn" id="copyBtn"><span>📋</span> 复制</button>
                    </div>
                </div>
                <div class="stats-grid" id="statsGrid"></div>
            </div>

            <div class="history-section">
                <div class="history-title">📜 历史记录</div>
                <div class="history-list" id="historyList">
                    <div class="empty-history">暂无记录，上传文件开始分析</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const fileTag = document.getElementById('fileTag');
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            const clearFileBtn = document.getElementById('clearFileBtn');
            const resultArea = document.getElementById('resultArea');
            const maxNumberDisplay = document.getElementById('maxNumberDisplay');
            const copyBtn = document.getElementById('copyBtn');
            const statsGrid = document.getElementById('statsGrid');
            const historyList = document.getElementById('historyList');
            const confirmModal = document.getElementById('confirmModal');
            const modalConfirmBtn = document.getElementById('modalConfirmBtn');
            const modalCancelBtn = document.getElementById('modalCancelBtn');

            let currentFile = null;
            let pendingDeleteId = null;

            function formatFileSize(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
            }

            function truncateText(text, maxLen = 40) {
                return text.length > maxLen ? text.slice(0, maxLen) + '…' : text;
            }

            function extractNumbers(text) {
                const pattern = /-?\b\d+(?:\.\d+)?(?:[eE][+-]?\d+)?\b/g;
                const matches = text.match(pattern);
                if (!matches) return [];
                return matches.map(Number).filter(n => !isNaN(n) && isFinite(n));
            }

            function computeStats(numbers) {
                if (numbers.length === 0) return null;
                const sum = numbers.reduce((a, b) => a + b, 0);
                const max = Math.max(...numbers);
                const min = Math.min(...numbers);
                const avg = sum / numbers.length;
                return { count: numbers.length, max, min, avg, sum };
            }

            // 历史记录管理
            const STORAGE_KEY = 'number_analyzer_history';
            function loadHistory() {
                try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch (e) { return []; }
            }
            function saveHistory(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

            function addHistoryRecord(file, maxNumber, numbersCount, textSnippet) {
                const history = loadHistory();
                const record = {
                    id: Date.now(),
                    fileName: file.name,
                    fileSize: file.size,
                    maxNumber: maxNumber,
                    numbersCount: numbersCount,
                    textPreview: truncateText(textSnippet, 60),
                    timestamp: new Date().toISOString()
                };
                history.unshift(record);
                if (history.length > 20) history.pop();
                saveHistory(history);
                renderHistory();
            }

            function deleteHistoryRecord(id) {
                let history = loadHistory();
                history = history.filter(item => item.id !== id);
                saveHistory(history);
                renderHistory();
            }

            function renderHistory() {
                const history = loadHistory();
                historyList.innerHTML = '';
                if (history.length === 0) {
                    historyList.innerHTML = '<div class="empty-history">暂无记录，上传文件开始分析</div>';
                    return;
                }
                history.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `
                        <div class="history-info">
                            <div class="history-file-name" title="${escapeHtml(item.fileName)}">📄 ${escapeHtml(item.fileName)}</div>
                            <div class="history-meta">
                                <span>📏文件大小： ${formatFileSize(item.fileSize)}</span>
                                <span>🔢 最大数字: ${escapeHtml(String(item.maxNumber))}</span>
                                <span>📊 共${item.numbersCount}个数字</span>
                            </div>
                            <div class="history-meta" style="margin-top:2px;">
                                <span style="color:#777;">${escapeHtml(item.textPreview)}</span>
                            </div>
                        </div>
                        <button class="delete-history-btn" data-id="${item.id}" title="删除记录">删除🗑️</button>
                    `;
                    historyList.appendChild(div);
                });
                document.querySelectorAll('.delete-history-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = Number(btn.dataset.id);
                        openDeleteConfirm(id);
                    });
                });
            }

            function escapeHtml(text) {
                if (!text) return '';
                return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
            }

            // 确认弹窗
            function openDeleteConfirm(id) {
                pendingDeleteId = id;
                confirmModal.classList.add('active');
            }
            function closeConfirmModal() {
                confirmModal.classList.remove('active');
                pendingDeleteId = null;
            }
            modalConfirmBtn.addEventListener('click', () => {
                if (pendingDeleteId !== null) deleteHistoryRecord(pendingDeleteId);
                closeConfirmModal();
            });
            modalCancelBtn.addEventListener('click', closeConfirmModal);
            confirmModal.addEventListener('click', (e) => {
                if (e.target === confirmModal) closeConfirmModal();
            });

            // 文件处理
            function processFile(file) {
                if (!file) return;
                currentFile = file;
                fileNameDisplay.textContent = file.name;
                fileTag.classList.add('show');
                resultArea.classList.remove('show');
                statsGrid.innerHTML = '';
                const reader = new FileReader();
                reader.onload = (e) => {
                    const text = e.target.result;
                    const numbers = extractNumbers(text);
                    if (numbers.length === 0) {
                        maxNumberDisplay.textContent = '未找到数字';
                        maxNumberDisplay.classList.add('shrink');
                        resultArea.classList.add('show');
                        statsGrid.innerHTML = '<div class="stat-item"><span class="stat-value">0</span><span class="stat-label">数字总数</span></div>';
                        addHistoryRecord(file, '无', 0, text.substring(0, 50));
                        return;
                    }
                    const stats = computeStats(numbers);
                    const maxNumStr = numbers.reduce((a, b) => (a >= b ? a : b)).toString();
                    maxNumberDisplay.textContent = maxNumStr;
                    maxNumberDisplay.classList.toggle('shrink', maxNumStr.length > 12);
                    resultArea.classList.add('show');
                    statsGrid.innerHTML = `
                        <div class="stat-item"><span class="stat-value">${stats.count}</span><span class="stat-label"> 总数</span></div>
                        <div class="stat-item"><span class="stat-value">${stats.max}</span><span class="stat-label"> 最大值</span></div>
                        <div class="stat-item"><span class="stat-value">${stats.min}</span><span class="stat-label"> 最小值</span></div>
                        <div class="stat-item"><span class="stat-value">${stats.avg.toFixed(2)}</span><span class="stat-label"> 平均值</span></div>
                        <div class="stat-item"><span class="stat-value">${stats.sum.toExponential(2)}</span><span class="stat-label"> 总和</span></div>
                    `;
                    addHistoryRecord(file, maxNumStr, stats.count, text.substring(0, 60));
                };
                reader.readAsText(file);
            }

            function clearFileSelection() {
                currentFile = null;
                fileInput.value = '';
                fileTag.classList.remove('show');
                resultArea.classList.remove('show');
                statsGrid.innerHTML = '';
                maxNumberDisplay.textContent = '';
                maxNumberDisplay.classList.remove('shrink');
            }

            dropZone.addEventListener('click', () => fileInput.click());
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('active'); });
            dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('active'); });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('active');
                const file = e.dataTransfer.files[0];
                if (file) processFile(file);
            });
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) processFile(file);
            });
            clearFileBtn.addEventListener('click', clearFileSelection);
            copyBtn.addEventListener('click', () => {
                const textToCopy = maxNumberDisplay.textContent;
                if (!textToCopy || textToCopy === '未找到数字') return;
                navigator.clipboard.writeText(textToCopy).then(() => {
                    copyBtn.classList.add('copied');
                    copyBtn.innerHTML = '<span>✅</span> 已复制';
                    setTimeout(() => {
                        copyBtn.classList.remove('copied');
                        copyBtn.innerHTML = '<span>📋</span> 复制';
                    }, 1800);
                }).catch(() => alert('复制失败，请手动复制'));
            });

            renderHistory();
        })();
    </script>
</body>
</html>
